name: Optimizer Scheduler

# ──────────────────────────────────────────────────────────────────────────────
# Always-On Scheduler
# Runs automatically every 24 h (00:00 UTC) or on-demand via the Actions UI.
# After a successful run, commits new output artifacts back to the repo so the
# Streamlit web app always displays fresh results without a manual push.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   FRED_API_KEY          – St. Louis Fed FRED API key
#   GEMINI_API_KEY        – Google AI Studio key (AI briefing, optional)
#   GROQ_API_KEY          – Groq LLM key (AI briefing, optional)
#   TELEGRAM_BOT_TOKEN    – Telegram bot token from @BotFather
#   TELEGRAM_CHAT_ID      – Your personal Telegram chat ID
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 0 * * *'    # Every 24 hours at 00:00 UTC
  workflow_dispatch:        # Manual trigger from the Actions UI at any time

concurrency:
  group: optimizer-scheduler
  cancel-in-progress: false # Never cancel a running job — let it finish

jobs:
  run-optimizer:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write        # Required to push artifact commits back to the repo

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Notify Telegram: run started ────────────────────────────────────
      - name: Telegram — run started
        shell: bash
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TRIGGER="${{ github.event_name }}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="$(cat <<EOF
          🚀 <b>STRATUM QUANT ANALYTICS</b>
          Optimizer Scheduler <b>started</b>

          🕐 ${TIMESTAMP}
          ▸ Trigger: ${TRIGGER}
          ▸ Run #${{ github.run_number }}

          <a href="${RUN_URL}">View live logs →</a>
          EOF
          )" > /dev/null

      # ── 3. Python environment ───────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 4. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Execute pipeline + grid-search optimizer ─────────────────────────
      - name: Run pipeline and optimizer
        shell: bash
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONPATH: "${{ github.workspace }}/src:${{ github.workspace }}"
          ENVIRONMENT: "actual"
          RANDOM_SEED: "42"
          ENFORCE_REPRODUCIBILITY: "true"
          FRED_API_KEY:              ${{ secrets.FRED_API_KEY }}
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          FULL_STACK_AUDIT_TIMEOUT:  "300"
        run: |
          set -euo pipefail
          python scripts/scheduler_batch.py

      # ── 6. Commit and push new artifacts ────────────────────────────────────
      - name: Commit and push output artifacts
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add output/ 2>/dev/null || true
          git add data/gold/ 2>/dev/null || true
          git add data/optimizer_history.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No artifact changes detected — skipping commit and push."
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git commit -m "ci(scheduler): automated optimizer run ${TIMESTAMP} [skip ci]"

          push_ok=false
          for attempt in 1 2 3; do
            if git push origin HEAD; then
              push_ok=true
              break
            fi
            echo "Push attempt ${attempt}/3 failed — retrying in 15 s..."
            sleep 15
          done

          if [ "$push_ok" != "true" ]; then
            echo "All push attempts failed." >&2
            exit 1
          fi

      # ── 7. Upload artifacts to GitHub Actions for debugging ─────────────────
      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: optimizer-outputs-${{ github.run_id }}
          path: |
            output/
            logs/
            data/users/
          retention-days: 14
          if-no-files-found: ignore

      # ── 8. Notify Telegram: SUCCESS ─────────────────────────────────────────
      - name: Telegram — success
        if: success()
        shell: bash
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="$(cat <<EOF
          ✅ <b>STRATUM QUANT ANALYTICS</b>
          Optimizer run <b>completed successfully</b>

          🕐 ${TIMESTAMP}
          ▸ Run #${{ github.run_number }}
          ▸ Fresh artifacts committed to repo
          ▸ Streamlit app will auto-refresh

          <a href="${RUN_URL}">View full report →</a>
          EOF
          )" > /dev/null

      # ── 9. Notify Telegram: FAILURE ─────────────────────────────────────────
      - name: Telegram — failure
        if: failure()
        shell: bash
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="$(cat <<EOF
          ❌ <b>STRATUM QUANT ANALYTICS</b>
          Optimizer run <b>FAILED</b>

          🕐 ${TIMESTAMP}
          ▸ Run #${{ github.run_number }}
          ▸ Action required — check logs

          <a href="${RUN_URL}">Investigate →</a>
          EOF
          )" > /dev/null
