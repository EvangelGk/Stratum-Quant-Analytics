

on:
  schedule:
    - cron: '0 0 * * *'  # Every 24 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-optimizer:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONUNBUFFERED: "1"
      OPTIMIZER_AUTO_GIT_PUSH: "0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run optimizer and commit artifacts
        run: |
          python scripts/scheduler_batch.py
