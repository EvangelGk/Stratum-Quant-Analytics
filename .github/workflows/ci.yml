name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]

jobs:
  quality:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.1.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-ubuntu-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-ubuntu-

      - name: Install dependencies
        run: poetry install --no-interaction

      # WARNING-ONLY: Reports style issues but never blocks the build
      - name: Ruff — lint (warning only)
        run: poetry run ruff check . || true
        continue-on-error: true

      # WARNING-ONLY: Format drift is cosmetic, not functional
      - name: Ruff — format check (warning only)
        run: poetry run ruff format --check . || true
        continue-on-error: true

      # WARNING-ONLY: We only care if core Quant logic types are broken
      - name: MyPy — type check (warning only)
        run: poetry run mypy src/ --ignore-missing-imports --follow-imports=silent || true
        continue-on-error: true

      # REQUIRED: Pipeline must run without crashing. DeprecationWarnings are ignored.
      - name: Pytest — functional tests
        env:
          FRED_API_KEY: ci_dummy_key
        run: poetry run pytest --tb=short -q -W ignore::DeprecationWarning -W ignore::RuntimeWarning

      - name: Upload diagnostics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-ubuntu-py3.12
          path: |
            .pytest_cache
            logs
            output
            data/users/**/processed/quality
          if-no-files-found: ignore

      # JOB SUMMARY: One-glance view of what matters
      - name: Write Job Summary
        if: always()
        run: |
          echo "## CI Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Runner | ubuntu-latest / Python 3.12 |" >> $GITHUB_STEP_SUMMARY
          echo "| Ruff Lint | ⚠️ Warning-only (cosmetic issues do not block) |" >> $GITHUB_STEP_SUMMARY
          echo "| MyPy | ⚠️ Warning-only (missing imports silenced) |" >> $GITHUB_STEP_SUMMARY
          echo "| Pytest | ✅ Required — pipeline crash = RED |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Rule:** GREEN = functional. RED = code is unrunnable." >> $GITHUB_STEP_SUMMARY
