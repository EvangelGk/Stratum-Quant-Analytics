name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]

jobs:
  quality:
    name: Lint, Type Check & Test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60      # FIX #7 — prevent CI from hanging indefinitely
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.1.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff — lint
        run: poetry run ruff check .

      - name: Ruff — format check
        run: poetry run ruff format --check .

      - name: MyPy — type check
        run: poetry run mypy src/

      - name: Pytest — test suite
        env:
          FRED_API_KEY: ci_dummy_key
        run: poetry run pytest --tb=short -q

      - name: Pytest — governance gate checks
        env:
          FRED_API_KEY: ci_dummy_key
        run: poetry run pytest -m governance -q --tb=short -W error::UserWarning

      - name: Upload diagnostics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            .pytest_cache
            logs
            output
            data/users/**/processed/quality
          if-no-files-found: ignore
